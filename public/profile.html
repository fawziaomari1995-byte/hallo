<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحتي - فعاليات درعا</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <div>
        <a href="/" class="button secondary small">الرئيسية</a>
      </div>
      <h1>الملف الشخصي</h1>
      <button id="logoutButton" class="button secondary small">تسجيل الخروج</button>
    </div>
  </header>

  <main class="container page-panel">
    <section class="panel panel-highlight">
      <div class="section-header">
        <h2>تذاكري الحالية</h2>
        <p class="muted-text">التذاكر النشطة التي لم يحن موعد فعاليتها بعد.</p>
      </div>
      <div id="activeTickets" class="tickets-list"></div>
    </section>

    <section class="panel panel-highlight">
      <div class="section-header">
        <h2>أرشيف الفعاليات</h2>
        <p class="muted-text">الفعاليات السابقة مع إمكانية إضافة تقييم ومراجعة.</p>
      </div>
      <div id="historyTickets" class="tickets-list"></div>
    </section>

    <section class="panel panel-highlight hidden" id="profileLoginNotice">
      <p class="muted-text">يرجى تسجيل الدخول من <a href="/">الصفحة الرئيسية</a> للوصول إلى حسابك.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 فعالية درعا</p>
  </footer>
  <script src="/profile.js"></script>
</body>
</html>
